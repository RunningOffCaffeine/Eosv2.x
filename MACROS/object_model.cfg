[gcode_macro SEARCH_VARS]
description: Search the printer object model for a specific variable. Usage: SEARCH_VARS S="<search_term>"
gcode:
    {% set search = params.S|default("")|lower %}
    {% set ns = namespace(found=false) %}
    
    {% for item in printer %}
        # Check if the main object matches the search
        {% if search in item|lower %}
            { action_respond_info(item) }
            {% set ns.found = true %}
        {% endif %}
        
        # Check if any child attributes match the search
        {% for child in printer[item] %}
            {% if search in item|lower ~ "." ~ child|lower %}
                { action_respond_info("%s.%s = %s" % (item, child, printer[item][child])) }
                {% set ns.found = true %}
            {% endif %}
        {% endfor %}
    {% endfor %}
    
    {% if not ns.found %}
        { action_respond_info("Nothing found for \"%s\"" % search) }
    {% endif %}